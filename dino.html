<!DOCTYPE html>
<html lan="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINO RUNNER</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P$display=swap');
 * { margin: 0; padding: 0; box-sizing: border-box;}

 body {
    background: #0f0f1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #e0e0e0;
    overflow: hidden;
 }

h1 {
    font-size: 1.3rem; color: #00ff88;
    text-shadow: 0 0 20px #00ff8877;
    margin-bottom: 10px; letter-spacing: 4px;    
}

#score-bar {
   display: flex; justify-content: space-between;
   width: 820px; max-width: 96vw;
   margin-bottom: 8px; font-size: 0.5rem; color: #888;
}
#score-bar span { color: #00ff88 }

#gameContainer {
    position: relative; width: 820px; max-width: 96vw;
    background: #16213e;
    border: 2px solid #00ff88;
    box-shadow: 0 0 40px #00ff8822, inset 0 0 40px #00000055;
    overflow: hidden; border-radius: 4px;
}

canvas { display: block; width: 100%; image-rendering: pixelated; }

 /* ── OVERLAY ── */
 #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 10px;
 }
#overlay.hidden { display: none; }
#overlay .emoji { font-size: 3rem; animation: hop 0.7s infinite alternate; }
@keyframes hop { from { transform: translateY(0); } to { transform: translateY(-10px); } }
#overlay .title { font-size: 1rem; color: #00ff88; text-shadow: 0 0 12px #00ff88; }
#overlay .sub { font-size: 0.5rem; color: #aaa; text-align: center; line-height: 2.2; }
#overlay .dead { font-size: 0.65rem; color: #ff6b6b; }
#overlay .record { font-size: 0.5rem; color: #ffaa33; }

/* ── CHARACTER SELECT ── */
#charSelect {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 16px;
}
 #charSelect.hidden { display: none; }
 #charSelect .cs-title {
    font-size: 0.75rem; color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
    letter-spacing: 2px;
 }
 #charSelect .cs-sub {
    font-size: 0.38rem; color: #666;
 }
 #dino-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
 }
 .dino-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
    padding: 10px 14px;
    border: 2px solid #ffffff11;
    border-radius: 6px;
    background: #0f0f2a;
    transition: border-color 0.15s, transform 0.15s, background 0.15s;    
 }
 .dino-card.hover { transform: translateY(-3px); background: #1a1a3a; }
 .dino-card.selected { border-color: #00ff88; background: #0a2a1a; box-shadow: 0 0 14px #00ff8844; }
 .dino-card canvas { display: block; image-rendering: pixelated; }
 .dino-name { font-size: 0.32rem; color: #aaa; letter-spacing: 1px; }
 .dino-card.selected .dino-name { color: #00ff88; }

 #start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    background: #00ff88; color: #0f0f1a;
    border: none; padding: 10px 24px;
    border-radius: 4px; cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 20px #00ff8855;
    transition: transform 0.1s; box-shadow: 0.1s;
 }
 #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ff8888; }
 #start-btn:active { transform: scale(0.97); }

 #hint { font-size: 0.4rem; color: #444; margin-top: 8px; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>🦕 DINO RUNNER</h1>
<div id="score-bar">
    <div>SCORE: <span id="scoreDisplay">0</span></div>
    <div>BEST: <span id="highDisplay">0</span></div>
    <div>LEVEL: <span id="levelDisplay">1</span></div>
</div>

<div id="gameContainer">
    <canvas id="c" width="820" height="260"></canvas>

    <!-- CHARACTER SELECT -->
     <div id="charSelect"></div>
     <div class="cs-title">🦕 CHOOSE YOUR DINO</div>
     <div id="dino-grid"></div>
     <button id="start-btn">▶ PLAY</button>
     <div class="cs-sub">← → arrow keys or click to pick</div>     
</div>

<!-- GAME OVERLAY (pause / game over) -->
 <div id="overlay" class="hidden"></div>
</div>
<div id="hint">SPACE / ↑ = JUMP &nbsp;•&nbsp; ↓ = DUCK &nbsp;•&nbsp; P = PAUSE</div>
