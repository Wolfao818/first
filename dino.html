<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINO RUNNER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: #e0e0e0;
    overflow: hidden;
  }

  h1 {
    font-size: 1.3rem; color: #00ff88;
    text-shadow: 0 0 20px #00ff8877;
    margin-bottom: 10px; letter-spacing: 4px;
  }

  #score-bar {
    display: flex; justify-content: space-between;
    width: 820px; max-width: 96vw;
    margin-bottom: 8px; font-size: 0.5rem; color: #888;
  }
  #score-bar span { color: #00ff88; }
  #score-bar .cv { color: #fbbf24; }

  #gameContainer {
    position: relative; width: 1800px; max-width: 180vw;
    background: #16213e;
    border: 2px solid #00ff88;
    box-shadow: 0 0 40px #00ff8822, inset 0 0 40px #00000055;
    overflow: hidden; border-radius: 4px;
  }

  canvas { display: block; image-rendering: pixelated; }
  #c { width: 100%; }
  
  /* ──  ── */
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 10px;
  }
  #overlay.hidden { display: none; }
  #overlay .emoji { font-size: 3rem; animation: hop 0.7s infinite alternate; }
  @keyframes hop { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  #overlay .title { font-size: 1rem; color: #00ff88; text-shadow: 0 0 12px #00ff88; }
  #overlay .sub { font-size: 0.9rem; color: #aaa; text-align: center; line-height: 2.2; }
  #overlay .dead { font-size: 0.9rem; color: #ff6b6b; }
  #overlay .record { font-size: 0.9rem; color: #ffaa33; }

  /* ──  ── */
  .ov-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.85rem; padding: 8px 18px;
    border-radius: 4px; border: none; cursor: pointer;
    letter-spacing: 1px; margin: 3px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .ov-btn:hover { transform: scale(1.06); }
  .ov-btn.primary { background: #00ff88; color: #0f0f1a; box-shadow: 0 0 14px #00ff8855; }
  .ov-btn.secondary { background: #1a1a3a; color: #888; border: 1px solid #333; }

  /* ──  ── */
  #charSelect {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 16px;
  }
  #charSelect.hidden { display: none; }
  #charSelect .cs-title {
    font-size: 1.70rem; color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
    letter-spacing: 2px;
  }
  #charSelect .cs-sub { font-size: 0.68rem; color: #666; }
  #dino-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .dino-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; padding: 10px 14px;
    border: 2px solid #ffffff11; border-radius: 6px; background: #0f0f2a;
    transition: border-color 0.15s, transform 0.15s, background 0.15s;
  }
  .dino-card:hover { transform: translateY(-3px); background: #1a1a3a; }
  .dino-card.selected { border-color: #00ff88; background: #0a2a1a; box-shadow: 0 0 14px #00ff8844; }
  .dino-card.locked { cursor: not-allowed; opacity: 0.45; }
  .dino-card.locked:hover { transform: none; background: #0f0f2a; }
  .dino-card canvas { display: block; image-rendering: pixelated; }
  .dino-name { font-size: 0.62rem; color: #aaa; letter-spacing: 1px; }
  .dino-card.selected .dino-name { color: #00ff88; }
  .dino-lock { font-size: 0.68rem; color: #fbbf24; }

  #start-btn {
    font-family: 'Press Start 2P', monospace; font-size: 0.65rem;
    background: #00ff88; color: #0f0f1a;
    border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer;
    letter-spacing: 2px; box-shadow: 0 0 20px #00ff8855;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ff8888; }
  #start-btn:active { transform: scale(0.97); }

  #mainMenu {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 12px;
  }
  #mainMenu.hidden { display: none; }
  .mm-title { font-size: 3rem; color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8866; letter-spacing: 4px; }
  .mm-coins { font-size: 0.6rem; color: #fbbf24; text-shadow: 0 0 8px #fbbf2466; margin: 2px 0; }
  .mm-btn {
    font-family: 'Press Start 2P', monospace; font-size: 0.78rem;
    background: transparent; border: 2px solid #00ff88; color: #00ff88;
    padding: 10px 0; border-radius: 4px; cursor: pointer;
    letter-spacing: 2px; width: 220px; text-align: center;
    transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
  }
  .mm-btn:hover { background: #00ff8822; transform: scale(1.04); box-shadow: 0 0 16px #00ff8844; }
  .mm-btn.play { background: #00ff88; color: #0f0f1a; box-shadow: 0 0 18px #00ff8855; }
  .mm-btn.play:hover { background: #00ff99; }

  #shopMenu {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #16213eee; gap: 12px;
    padding: 16px 0;
  }
  #shopMenu.hidden { display: none; }
  .shop-title { font-size: 1.7rem; color: #fbbf24; text-shadow: 0 0 10px #fbbf24; letter-spacing: 2px; }
  .shop-coins { font-size: 1.2rem; color: #fbbf24; }
  #shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .shop-card {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 10px 12px; border: 2px solid #ffffff11; border-radius: 6px;
    background: #0f0f2a; min-width: 90px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .shop-card.owned { border-color: #00ff8855; }
  .shop-card.can-buy { border-color: #fbbf2466; cursor: pointer; }
  .shop-card.can-buy:hover { transform: translateY(-3px); border-color: #fbbf24; background: #1a1a2a; }
  .shop-card.cant-afford { opacity: 0.5; }
  .shop-card canvas { display: block; image-rendering: pixelated; }
  .shop-dino-name { font-size: 0.68rem; color: #aaa; }
  .shop-price { font-size: 0.6rem; color: #fbbf24; }
  .shop-owned-tag { font-size: 0.68rem; color: #00ff88; }
  .shop-back-btn {
    font-family: 'Press Start 2P', monospace; font-size: 0.82rem;
    background: transparent; border: 1px solid #333; color: #555;
    padding: 8px 20px; border-radius: 4px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .shop-back-btn:hover { color: #aaa; border-color: #aaa; }

  #hint { font-size: 0.8rem; color: #444; margin-top: 8px; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>🦕 DINO RUNNER</h1>
<div id="score-bar">
  <div>SCORE: <span id="scoreDisplay">0</span></div>
  <div>BEST: <span id="highDisplay">0</span></div>
  <div>LEVEL: <span id="levelDisplay">1</span></div>
  <div>🪙 <span id="coinDisplay" class="cv">0</span></div>
</div>

<div id="gameContainer">
  <canvas id="c" width="820" height="260"></canvas>

  <!-- ──  ── -->
  <div id="mainMenu">
    <div class="mm-title">🦕 DINO RUNNER</div>
    <canvas id="mmDinoCanvas" width="110" height="85" style="image-rendering:pixelated"></canvas>
    <div class="mm-coins">🪙 <span id="mmCoins">0</span> COINS</div>
    <button class="mm-btn play" id="mm-play">▶ PLAY</button>
    <button class="mm-btn" id="mm-dinos">🦕 DINOS</button>
    <button class="mm-btn" id="mm-shop">🛒 SHOP</button>
  </div>

  <div id="charSelect" class="hidden">
    <div class="cs-title">🦕 CHOOSE YOUR DINO</div>
    <div id="dino-grid"></div>
    <div style="display:flex;gap:12px;align-items:center">
      <button id="cs-back" style="font-family:'Press Start 2P',monospace;font-size:0.42rem;background:transparent;border:1px solid #333;color:#555;padding:15px 25px;border-radius:4px;cursor:pointer;transition:color .15s,border-color .15s" onmouseover="this.style.color='#aaa';this.style.borderColor='#aaa'" onmouseout="this.style.color='#555';this.style.borderColor='#333'">← MENU</button>
      <button id="start-btn">▶ PLAY</button>
    </div>
    <div class="cs-sub">← → arrows or click to pick</div>
  </div>

  <div id="shopMenu" class="hidden">
    <div class="shop-title">🛒 DINO SHOP</div>
    <div class="shop-coins">🪙 <span id="shopCoins">0</span> COINS</div>
    <div id="shop-grid"></div>
    <button class="shop-back-btn" id="shop-back">← BACK TO MENU</button>
  </div>

  <div id="overlay" class="hidden"></div>
</div>
<div id="hint">SPACE / ↑ = JUMP &nbsp;•&nbsp; ↓ = DUCK &nbsp;•&nbsp; P = PAUSE</div>

<script>

const DINO_TYPES = [
  { name: 'Jade',    body:'#4ade80', dark:'#16a34a', belly:'#bbf7d0', price:0,   special:null    },
  { name: 'Inferno', body:'#f87171', dark:'#b91c1c', belly:'#fecaca', price:0,   special:null    },
  { name: 'Ocean',   body:'#38bdf8', dark:'#0369a1', belly:'#bae6fd', price:0,   special:null    },
  { name: 'Solar',   body:'#fbbf24', dark:'#b45309', belly:'#fef08a', price:0,   special:null    },
  { name: 'Violet',  body:'#a78bfa', dark:'#6d28d9', belly:'#ede9fe', price:25,  special:'crown' },
  { name: 'Coral',   body:'#fb923c', dark:'#c2410c', belly:'#fed7aa', price:50,  special:'armor' },
  { name: 'Rose',    body:'#f472b6', dark:'#be185d', belly:'#fce7f3', price:100, special:'wings' },
  { name: 'Phantom', body:'#94a3b8', dark:'#475569', belly:'#e2e8f0', price:150, special:'ghost' },
];

let selectedDinoIdx = 0;

function rr(ctx, x, y, w, h, r) {
  
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawDino(ctx, x, bottomY, w, h, palette, opts = {}) {
  const { ducking = false, dead = false, legPhase = 0, special = null } = opts;
  const top = bottomY - h;
  const C = palette;

  ctx.save();
  if (ducking) {
    ctx.fillStyle = C.dark;
    ctx.beginPath();
    ctx.moveTo(x, top + h*0.3);
    ctx.lineTo(x-14, top+h*0.5);
    ctx.lineTo(x, top+h*0.7);
    ctx.closePath(); ctx.fill();
    ctx.shadowColor = C.body; ctx.shadowBlur = 8;
    ctx.fillStyle = C.body;
    rr(ctx, x, top, w, h, 6); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.belly;
    rr(ctx, x+4, top+h*0.35, w-10, h*0.55, 4); ctx.fill();
    ctx.fillStyle = C.body;
    ctx.shadowColor = C.body; ctx.shadowBlur = 5;
    rr(ctx, x+w-4, top-4, 26, 20, 5); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.dark;
    rr(ctx, x+w+4, top+8, 18, 8, 3); ctx.fill();
    if (dead) {
      ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+w+8,top); ctx.lineTo(x+w+16,top+8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w+16,top); ctx.lineTo(x+w+8,top+8); ctx.stroke();
    } else {
      ctx.fillStyle = '#0f0f1a';
      ctx.beginPath(); ctx.arc(x+w+12,top+4,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x+w+13,top+3,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = C.dark;
    ctx.fillRect(x+6,  top+h-2, 10, 10);
    ctx.fillRect(x+22, top+h-2, 10, 10);
    ctx.fillStyle = C.body;
    ctx.fillRect(x+6,  top+h+6, 12, 4);
    ctx.fillRect(x+22, top+h+6, 12, 4);
  } else {
    ctx.fillStyle = C.dark;
    ctx.beginPath();
    ctx.moveTo(x+4, top+h*0.5);
    ctx.lineTo(x-16, top+h*0.7);
    ctx.lineTo(x+4, top+h*0.85);
    ctx.closePath(); ctx.fill();
    ctx.shadowColor = C.body; ctx.shadowBlur = 10;
    ctx.fillStyle = C.body;
    rr(ctx, x+2, top+h*0.2, w-4, h*0.8, 8); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.belly;
    rr(ctx, x+7, top+h*0.42, w-16, h*0.45, 5); ctx.fill();
    ctx.fillStyle = C.dark;
    rr(ctx, x+w-12, top+h*0.32, 10, 7, 3); ctx.fill();
    ctx.fillStyle = C.body;
    ctx.fillRect(x+w-6,  top+h*0.32+7, 3, 5);
    ctx.fillRect(x+w-10, top+h*0.32+7, 3, 4);
    ctx.fillStyle = C.body;
    rr(ctx, x+w-10, top+h*0.05, 14, h*0.25, 5); ctx.fill();
    ctx.shadowColor = C.body; ctx.shadowBlur = 8;
    ctx.fillStyle = C.body;
    rr(ctx, x+w-8, top-14, 28, 20, 6); ctx.fill();
    rr(ctx, x+w+2, top+4, 22, 10, 4); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.dark;
    rr(ctx, x+w+4, top+10, 18, 7, 3); ctx.fill();
    ctx.fillStyle = '#fff';
    for (let t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.moveTo(x+w+6+t*5, top+10);
      ctx.lineTo(x+w+8+t*5, top+14);
      ctx.lineTo(x+w+10+t*5, top+10);
      ctx.closePath(); ctx.fill();
    }
    if (dead) {
      ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(x+w+4,top-10); ctx.lineTo(x+w+12,top-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w+12,top-10); ctx.lineTo(x+w+4,top-2); ctx.stroke();      
    } else {
      ctx.fillStyle = '#0f0f1a';
      ctx.beginPath(); ctx.arc(x+w+8,top-6,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x+w+9,top-7,2,0,Math.PI*2); ctx.fill();      
    }
    ctx.fillStyle = C.dark;
    const sx = x+w-6;
    for (let s=0; s<3; s++) {
      ctx.beginPath();
      ctx.moveTo(sx-s*7,     top+h*0.18-s*2);
      ctx.lineTo(sc-s*7-4,  top+h*0.05-s*3)
      ctx.lineTo(sc-s*7-8,  top+h*0.18-s*2);
      ctx.closePath(); ctx.fill();
    }
    const l1 = legPhase === 0;
    ctx.fillStyle = C.dark;
    ctx.fillRect(x+10, top+h-2, 11, l1?16:10);
    ctx.fillStyle = C.body;
    ctx.fillRect(x+8,  top+h+(l1?12:6), 15, 5);
    ctx.fillStyle = C.dark;
    ctx.fillRect(x+24, top+h-2, 11, l1?10:16);
    ctx.fillStyle = C.body;
    ctx.fillRect(x+22, top+h+(l1?6:12), 15, 5);
  }

  if (special && !dead) {
    const headX = x+w-8, headY = top-14;
    if (special==='crown') {
      ctx.shadowColor='#fbbf24'; ctx.shadowBlur=10;
      ctx.shadowColor='fbbf24';
      ctx.fillRect(headX+2, headY-9, 22, 8);
      ctx.fillRect(headX+2, headY-14, 5, 6);
      ctx.fillRect(headX+10, headY-13, 5, 6);
      ctx.fillRect(headX+18, headY-14, 5, 6);
      ctx.fillStyle='#ef4444';
      ctx.beginPath(); ctx.arc(headX+5,  headY-7, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#60a5fa';
      ctx.beginPath(); ctx.arc(headX+13,  headY-7, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#4ade80';
      ctx.beginPath(); ctx.arc(headX+21,  headY-7, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    } else if (special==='armor') {
      ctx.shadowColor='#94a3b8'; ctx.shadowBlur=6;
      ctx.fillStyle='cbd5e1';
      rr(ctx, x+4, top+h*0.2, w-8, h*0.28, 4); ctx.fill();
      ctx.fillStyle='#94a3b8';
      ctx.lineWidth=1.5; ctx.strokeStyle='#64748b';
      ctx.beginPath(); ctx.moveTo(x+w/2-4, top+h*0.2); ctx.lineTo(x+w/2-4, top+h*0.48); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w/2+4, top+h*0.2); ctx.lineTo(x+w/2+4, ctx.lineTo, top+h*0.48); ctx.stroke();
      ctx.fillStyle='#e2e8f0';
      rr(ctx, x+w-16, top+h*0.15, 12, 10, 3); ctx.fill();
      ctx.shadowBlur=0;
    } else if (special==='wings') {
      // skrzydla po bokach
      const wy = top+h*0.35;
      const wingFlap = Math.sin(Date.now()*0.008)*6;
      ctx.shadowColor=C.body; ctx.shadowBlur=10;
      ctx.fillStyle=C.belly;
      // po lewo
      ctx.beginPath();
      ctx.moveTo(x+2, wy);
      ctx.bezierCurveTo(x-18, wy-10+wingFlap, x-22, wy+8+wingFlap, x+2, wy+18);
      ctx.closePath(); ctx.fill();
      // obrys
      ctx.strokeStyle=C.dark; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(x+2, wy);
      ctx.bezierCurveTo(x-18, wy-10+wingFlap, x-22, wy+8+wingFlap, x_2, wy+18);
      ctx.stroke();
      //
      ctx.strokeStyle=C.body+'99'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x+2,wy+9); ctx.lineTo(x-14,wy+3+wingFlap); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+2,wy+14); ctx.lineTo(x-12,wy+13+wingFlap); ctx.stroke();
      ctx.shadowBlur=0;
    } 
  }
